# Apache: agregar estas directivas dentro del VirtualHost HTTPS existente de kingbarber.webhop.net.
#
# Requisitos de modulos:
#   a2enmod proxy proxy_http headers ssl rewrite
# En XAMPP/Apache Windows, habilitar los modulos equivalentes en httpd.conf.
#
# URL publica API:
#   https://kingbarber.webhop.net/api
#
# Webhook Mercado Pago:
#   https://kingbarber.webhop.net/api/visitas/mercadopago/webhook

ProxyPreserveHost On

# /api sin slash redirige a /api/ para evitar rutas ambiguas.
RedirectMatch 301 ^/api$ /api/

# El slash final en ambos lados hace que Apache quite el prefijo /api
# antes de enviar la solicitud a FastAPI.
# Ej:
#   /api/visitas/mercadopago/webhook -> http://127.0.0.1:8000/visitas/mercadopago/webhook
ProxyPass        /api/ http://127.0.0.1:8000/
ProxyPassReverse /api/ http://127.0.0.1:8000/

# Headers utiles para que FastAPI sepa que la URL publica original es HTTPS.
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Host "kingbarber.webhop.net"
RequestHeader set X-Forwarded-Prefix "/api"

# Si el VirtualHost del frontend tiene fallback SPA, asegurate de que quede
# despues de estas reglas o que excluya /api para no capturar las llamadas al backend.
